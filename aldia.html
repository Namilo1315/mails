<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Maipú crece</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *{
      box-sizing:border-box;
    }

    html, body{
      margin:0;
      padding:0;
      background:#ffffff;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      width:100%;
    }

    .mail-wrap{
      width:100%;
      padding:10px 8px 16px;
      background:#ffffff;
    }

    .mail-box{
      width:100%;
      max-width:600px;
      margin:0 auto;
    }

    .slider{
      position:relative;
      width:100%;
      border-radius:14px;
      overflow:hidden;
      box-shadow:0 8px 18px rgba(0,0,0,0.08);
      background:#fff;
    }

    .slides{
      display:flex;
      width:100%;
      transition:transform .35s ease;
    }

    .slide{
      min-width:100%;
      width:100%;
      display:none;
    }

    .slide.active{
      display:block;
    }

    .slide img{
      display:block;
      width:100%;
      height:auto;
      border:0;
      outline:0;
    }

    .arrow{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      width:42px;
      height:42px;
      border:none;
      border-radius:50%;
      background:rgba(0,0,0,0.45);
      color:#fff;
      font-size:26px;
      line-height:42px;
      text-align:center;
      cursor:pointer;
      z-index:5;
    }

    .arrow:hover{
      background:rgba(0,0,0,0.60);
    }

    .arrow.prev{
      left:10px;
    }

    .arrow.next{
      right:10px;
    }

    .dots{
      display:flex;
      justify-content:center;
      gap:8px;
      padding:12px 0 0;
    }

    .dot{
      width:11px;
      height:11px;
      border-radius:50%;
      border:none;
      background:#d1d1d1;
      cursor:pointer;
      padding:0;
    }

    .dot.active{
      background:#ef7d00;
    }

    .btn-wrap{
      text-align:center;
      padding-top:16px;
    }

    .btn-vermas{
      display:inline-block;
      background:#ef7d00;
      color:#ffffff;
      text-decoration:none;
      font-size:16px;
      font-weight:bold;
      padding:14px 26px;
      border-radius:10px;
    }

    @media (max-width:640px){
      .mail-wrap{
        padding:8px 4px 14px;
      }

      .mail-box{
        max-width:none;
        width:100%;
      }

      .slider{
        border-radius:14px;
      }

      .arrow{
        width:40px;
        height:40px;
        font-size:24px;
        line-height:40px;
      }

      .arrow.prev{
        left:8px;
      }

      .arrow.next{
        right:8px;
      }

      .btn-wrap{
        padding-top:14px;
      }
    }
  </style>
</head>

<body>
  <div class="mail-wrap">
    <div class="mail-box">

      <div class="slider">
        <button class="arrow prev" aria-label="Anterior">&#10094;</button>
        <button class="arrow next" aria-label="Siguiente">&#10095;</button>

        <div class="slides">
          <div class="slide active">
            <img src="https://publicassets.maipu.gob.ar/public/assets/60/48cb12b7-e0ac-4d23-a778-94df4ef725b4/69ea83d6b1ef3900812002.jpeg" alt="Imagen 1">
          </div>

          <div class="slide">
            <img src="https://publicassets.maipu.gob.ar/public/assets/61/4c3a5448-64cb-4203-b24a-446cb3158c80/69ea83ef30851199719129.jpeg" alt="Imagen 2">
          </div>

          <div class="slide">
            <img src="https://publicassets.maipu.gob.ar/public/assets/62/d3a1862a-4261-4d35-a08c-00f715f7bb88/69ea8405875a8077944374.jpeg" alt="Imagen 3">
          </div>

          <div class="slide">
            <img src="https://publicassets.maipu.gob.ar/public/assets/63/8141cf9d-24c9-4bca-bf06-93ca4a722fca/69ea841f9e3ec093339412.jpeg" alt="Imagen 4">
          </div>
        </div>
      </div>

      <div class="dots">
        <button class="dot active" aria-label="Ir a imagen 1"></button>
        <button class="dot" aria-label="Ir a imagen 2"></button>
        <button class="dot" aria-label="Ir a imagen 3"></button>
        <button class="dot" aria-label="Ir a imagen 4"></button>
      </div>

      <div class="btn-wrap">
        <a
          href="https://www.maipu.gob.ar/maipu-ofrece-facilidades-de-pago-para-evitar-multas-y-regularizar-deudas/"
          target="_blank"
          class="btn-vermas"
        >
          Ver más
        </a>
      </div>

    </div>
  </div>

  <script>
    const slides = document.querySelectorAll('.slide');
    const dots = document.querySelectorAll('.dot');
    const prevBtn = document.querySelector('.prev');
    const nextBtn = document.querySelector('.next');

    let current = 0;

    function showSlide(index){
      slides.forEach((slide, i) => {
        slide.classList.toggle('active', i === index);
      });

      dots.forEach((dot, i) => {
        dot.classList.toggle('active', i === index);
      });

      current = index;
    }

    prevBtn.addEventListener('click', () => {
      const index = current === 0 ? slides.length - 1 : current - 1;
      showSlide(index);
    });

    nextBtn.addEventListener('click', () => {
      const index = current === slides.length - 1 ? 0 : current + 1;
      showSlide(index);
    });

    dots.forEach((dot, i) => {
      dot.addEventListener('click', () => showSlide(i));
    });
  </script>
</body>
</html>
