<!doctype html>
<html ⚡4email lang="es">
  <head>
    <meta charset="utf-8">
    <script async src="https://cdn.ampproject.org/v0.js"></script>
    <script async custom-element="amp-carousel" src="https://cdn.ampproject.org/v0/amp-carousel-0.1.js"></script>

    <style amp4email-boilerplate>
      body { visibility: hidden; }
    </style>

    <style amp-custom>
      body{
        margin:0;
        padding:0;
        background:#ffffff;
        font-family:Arial, Helvetica, sans-serif;
      }

      .outer{
        width:100%;
        background:#ffffff;
      }

      .wrap{
        width:100%;
        max-width:600px;
        margin:0 auto;
        padding:0;
        box-sizing:border-box;
      }

      .card{
        background:#ffffff;
      }

      .slide-link{
        text-decoration:none;
        display:block;
      }

      .img{
        border-radius:14px;
      }

      amp-carousel{
        width:100%;
      }

      .btn-wrap{
        text-align:center;
        padding:18px 0 10px 0;
      }

      .btn{
        display:inline-block;
        background:#ef7d00;
        color:#ffffff;
        text-decoration:none;
        font-size:16px;
        font-weight:bold;
        line-height:1;
        padding:14px 26px;
        border-radius:10px;
      }
    </style>
  </head>

  <body>
    <div class="outer">
      <div class="wrap">
        <div class="card">

          <amp-carousel
            width="600"
            height="720"
            layout="responsive"
            type="slides"
            controls
            role="region"
            aria-label="Galería Maipú"
          >
            <a href="" target="_blank" class="slide-link">
              <amp-img
                src="https://publicassets.maipu.gob.ar/public/assets/60/48cb12b7-e0ac-4d23-a778-94df4ef725b4/69ea83d6b1ef3900812002.jpeg"
                width="600"
                height="720"
                layout="responsive"
                alt="Imagen 1"
                class="img"
              ></amp-img>
            </a>

            <a href="" target="_blank" class="slide-link">
              <amp-img
                src="https://publicassets.maipu.gob.ar/public/assets/61/4c3a5448-64cb-4203-b24a-446cb3158c80/69ea83ef30851199719129.jpeg"
                width="600"
                height="720"
                layout="responsive"
                alt="Imagen 2"
                class="img"
              ></amp-img>
            </a>

            <a href="" target="_blank" class="slide-link">
              <amp-img
                src="https://publicassets.maipu.gob.ar/public/assets/62/d3a1862a-4261-4d35-a08c-00f715f7bb88/69ea8405875a8077944374.jpeg"
                width="600"
                height="720"
                layout="responsive"
                alt="Imagen 3"
                class="img"
              ></amp-img>
            </a>

            <a href="" target="_blank" class="slide-link">
              <amp-img
                src="https://publicassets.maipu.gob.ar/public/assets/63/8141cf9d-24c9-4bca-bf06-93ca4a722fca/69ea841f9e3ec093339412.jpeg"
                width="600"
                height="720"
                layout="responsive"
                alt="Imagen 4"
                class="img"
              ></amp-img>
            </a>
          </amp-carousel>

          <div class="btn-wrap">
            <a
              href="https://www.maipu.gob.ar/maipu-ofrece-facilidades-de-pago-para-evitar-multas-y-regularizar-deudas/"
              target="_blank"
              class="btn"
            >
              Ver más
            </a>
          </div>

        </div>
      </div>
    </div>
  </body>
</html>
