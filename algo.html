<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modal animado Maipú Crece</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background:
        linear-gradient(rgba(8,22,33,.72), rgba(8,22,33,.72)),
        radial-gradient(circle at top left, rgba(34,160,207,.55), transparent 30%),
        linear-gradient(135deg, #061522, #0b2638 48%, #061522);
      color: #fff;
      overflow-x: hidden;
    }

    .pagina-demo {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 30px;
      text-align: center;
    }

    .pagina-demo img {
      width: min(380px, 82vw);
      margin-bottom: 22px;
      filter: drop-shadow(0 20px 35px rgba(0,0,0,.35));
    }

    .pagina-demo h1 {
      margin: 0 0 8px;
      font-size: clamp(34px, 6vw, 68px);
    }

    .pagina-demo p {
      max-width: 620px;
      margin: 0 auto;
      color: rgba(255,255,255,.78);
      font-size: 18px;
      line-height: 1.5;
    }

    /* ================================
       MODAL ANIMADO MAIPÚ + ARGENTINA
    ================================= */

    .maipu-welcome {
      position: fixed;
      inset: 0;
      z-index: 999999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(3, 11, 18, .72);
      backdrop-filter: blur(7px);
      animation: fondoEntrada .45s ease both;
    }

    .maipu-welcome.cerrar {
      pointer-events: none;
      animation: fondoSalida .55s ease forwards;
    }

    .maipu-modal {
      width: min(94vw, 860px);
      min-height: 590px;
      position: relative;
      overflow: hidden;
      border-radius: 36px;
      border: 1px solid rgba(255,255,255,.35);
      background:
        radial-gradient(circle at 76% 32%, rgba(255,255,255,.24), transparent 26%),
        radial-gradient(circle at 20% 18%, rgba(34,160,207,.45), transparent 34%),
        linear-gradient(135deg, #051827 0%, #06395c 42%, #0c7fb8 72%, #081e30 100%);
      box-shadow:
        0 36px 90px rgba(0,0,0,.48),
        inset 0 0 0 1px rgba(255,255,255,.15);
      animation: tarjetaEntra .75s cubic-bezier(.2,.9,.2,1) both;
    }

    .maipu-welcome.cerrar .maipu-modal {
      animation: tarjetaSale .55s ease forwards;
    }

    .cerrar-modal {
      position: absolute;
      top: 18px;
      right: 18px;
      z-index: 30;
      width: 44px;
      height: 44px;
      border: 0;
      border-radius: 50%;
      background: rgba(255,255,255,.95);
      color: #061522;
      font-size: 29px;
      font-weight: 800;
      line-height: 1;
      cursor: pointer;
      box-shadow: 0 14px 30px rgba(0,0,0,.25);
    }

    .brillos {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 10% 26%, rgba(255,255,255,.9) 0 2px, transparent 4px),
        radial-gradient(circle at 36% 12%, rgba(255,255,255,.9) 0 2px, transparent 4px),
        radial-gradient(circle at 58% 20%, rgba(255,218,94,.85) 0 2px, transparent 4px),
        radial-gradient(circle at 82% 14%, rgba(255,255,255,.9) 0 2px, transparent 4px),
        radial-gradient(circle at 92% 55%, rgba(255,218,94,.85) 0 2px, transparent 4px);
      animation: brillar 1.7s ease-in-out infinite alternate;
    }

    .contenido-modal {
      position: relative;
      z-index: 5;
      min-height: 590px;
      display: grid;
      grid-template-columns: 1.08fr .92fr;
      gap: 4px;
      align-items: center;
      padding: 58px 40px 58px;
    }

    .texto {
      position: relative;
      z-index: 12;
      padding-left: 12px;
    }

    .vamos {
      margin: 0;
      font-size: clamp(68px, 10vw, 116px);
      line-height: .78;
      letter-spacing: -4px;
      font-weight: 1000;
      color: #fff;
      text-transform: uppercase;
      text-shadow: 0 12px 25px rgba(0,0,0,.28);
      transform: rotate(-4deg);
      animation: textoGol 1.15s ease infinite alternate;
    }

    .argentina {
      display: block;
      margin-top: 9px;
      font-size: clamp(48px, 7vw, 86px);
      line-height: .82;
      color: #22a0cf;
      -webkit-text-stroke: 1px rgba(255,255,255,.55);
      text-shadow: 0 10px 22px rgba(0,0,0,.3);
    }

    .municipio {
      margin: 32px 0 0;
      font-size: clamp(38px, 4.8vw, 58px);
      line-height: 1.02;
      font-weight: 900;
      text-shadow: 0 12px 24px rgba(0,0,0,.22);
    }

    .municipio span {
      color: #f29400;
    }

    .linea-color {
      width: 260px;
      height: 8px;
      margin: 18px 0 20px;
      border-radius: 999px;
      background: linear-gradient(90deg, #22a0cf 0 33%, #94c11f 33% 66%, #f29400 66% 100%);
      box-shadow: 0 0 18px rgba(255,255,255,.18);
    }

    .mensaje {
      max-width: 420px;
      margin: 0;
      color: rgba(255,255,255,.92);
      font-size: 18px;
      line-height: 1.42;
    }

    .mensaje b {
      color: #7ed8ff;
    }

    /* TORO EN COMPUTADORA:
       - más al medio
       - más grande
       - la bandera lo tapa abajo para que no se vea cortado */
    .toro {
      position: relative;
      z-index: 7;
      align-self: end;
      justify-self: center;
      width: min(430px, 45vw);
      margin-left: -85px;
      margin-right: 0;
      margin-bottom: -46px;
      filter: drop-shadow(0 28px 38px rgba(0,0,0,.44));
      animation:
        toroEntrada .9s cubic-bezier(.2,.9,.2,1) both,
        toroFlota 1.85s ease-in-out .9s infinite;
      transform-origin: bottom center;
    }

    .toro::after {
      content: "";
      position: absolute;
      left: 18%;
      right: 18%;
      bottom: 10px;
      height: 34px;
      border-radius: 50%;
      background: rgba(0,0,0,.26);
      filter: blur(14px);
      z-index: -1;
      animation: sombraToro 1.85s ease-in-out infinite;
    }

    .toro img {
      width: 100%;
      display: block;
      border-radius: 0;
      animation: toroRespira 1.85s ease-in-out infinite;
    }

    /* Cinta/bandera argentina en movimiento */
    .bandera {
      position: absolute;
      left: -8%;
      right: -8%;
      bottom: 48px; /* bandera más baja para tapar el corte del toro */
      z-index: 9;
      height: 96px;
      opacity: .95;
      transform: rotate(-3deg);
      pointer-events: none;
      overflow: hidden;
    }

    .bandera::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg,
          #62c7f4 0 31%,
          #ffffff 31% 64%,
          #62c7f4 64% 100%);
      clip-path: polygon(0 42%, 12% 28%, 26% 44%, 40% 26%, 54% 45%, 69% 30%, 84% 48%, 100% 33%, 100% 100%, 0 100%);
      animation: banderaOnda 2.2s ease-in-out infinite;
      box-shadow: inset 0 10px 18px rgba(255,255,255,.35);
    }

    .bandera::after {
      content: "✦";
      position: absolute;
      left: 38%;
      top: 42px;
      color: #f2c438;
      font-size: 26px;
      animation: solGira 2.8s linear infinite;
      text-shadow: 0 0 14px rgba(242,196,56,.8);
    }

    /* Parte inferior fina: sin reloj, con logo */
    .franja-maipu {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 14;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 5px 24px;
      background:
        linear-gradient(135deg,
          rgba(255,255,255,.96) 0 42%,
          #94c11f 42% 54%,
          #22a0cf 54% 66%,
          #94c11f 66% 78%,
          #f29400 78% 100%);
      box-shadow: 0 -10px 24px rgba(0,0,0,.22);
    }

    .franja-contenido {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
    }

    .logo-footer {
      width: 100px;
      max-height: 30px;
      object-fit: contain;
      display: block;
    }

    .texto-footer {
      color: #061522;
      font-size: 15px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -.2px;
      white-space: nowrap;
    }

    .texto-footer span {
      color: #f29400;
    }

    /* Papelitos animados creados por JS */
    .papel {
      position: absolute;
      top: -30px;
      z-index: 20;
      width: var(--w);
      height: var(--h);
      background: var(--c);
      border-radius: 3px;
      opacity: .95;
      animation: caer var(--d) linear infinite;
      animation-delay: var(--delay);
      transform: rotate(var(--r));
      pointer-events: none;
    }

    .papel.cinta {
      border-radius: 999px;
      height: 6px;
    }

    @keyframes fondoEntrada {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fondoSalida {
      to { opacity: 0; }
    }

    @keyframes tarjetaEntra {
      from {
        opacity: 0;
        transform: translateY(35px) scale(.9);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes tarjetaSale {
      to {
        opacity: 0;
        transform: translateY(-20px) scale(1.03);
      }
    }

    @keyframes toroEntrada {
      from {
        opacity: 0;
        transform: translateX(90px) scale(.82) rotate(4deg);
      }
      to {
        opacity: 1;
        transform: translateX(0) scale(1) rotate(0);
      }
    }

    @keyframes toroFlota {
      0%, 100% {
        transform: translateY(0) rotate(0deg);
      }
      50% {
        transform: translateY(-13px) rotate(1.4deg);
      }
    }

    @keyframes toroRespira {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.025);
      }
    }

    @keyframes sombraToro {
      0%, 100% {
        transform: scaleX(1);
        opacity: .28;
      }
      50% {
        transform: scaleX(.82);
        opacity: .18;
      }
    }

    @keyframes textoGol {
      from { transform: rotate(-4deg) scale(1); }
      to { transform: rotate(-4deg) scale(1.035); }
    }

    @keyframes brillar {
      from { opacity: .55; filter: blur(0); }
      to { opacity: 1; filter: blur(.4px); }
    }

    @keyframes banderaOnda {
      0%, 100% {
        transform: translateX(0) skewX(-4deg);
        clip-path: polygon(0 42%, 12% 28%, 26% 44%, 40% 26%, 54% 45%, 69% 30%, 84% 48%, 100% 33%, 100% 100%, 0 100%);
      }
      50% {
        transform: translateX(18px) skewX(4deg);
        clip-path: polygon(0 34%, 12% 50%, 26% 29%, 40% 46%, 54% 27%, 69% 49%, 84% 31%, 100% 46%, 100% 100%, 0 100%);
      }
    }

    @keyframes solGira {
      from { transform: rotate(0deg) scale(1); }
      to { transform: rotate(360deg) scale(1.08); }
    }

    @keyframes caer {
      0% {
        transform: translate3d(0, -40px, 0) rotate(0deg);
        opacity: 0;
      }
      10% { opacity: 1; }
      100% {
        transform: translate3d(var(--x), 720px, 0) rotate(720deg);
        opacity: 0;
      }
    }

    /* CELULAR:
       - el toro está más grande
       - más al medio
       - no baja debajo del texto */
    @media (max-width: 700px) {
      .maipu-welcome {
        padding: 10px;
      }

      .maipu-modal {
        width: min(97vw, 860px);
        min-height: 510px;
        border-radius: 26px;
      }

      .contenido-modal {
        min-height: 510px;
        grid-template-columns: 1.02fr .88fr;
        align-items: center;
        gap: 0;
        padding: 34px 14px 50px;
      }

      .texto {
        padding-left: 0;
      }

      .vamos {
        font-size: 54px;
        line-height: .82;
        letter-spacing: -2px;
      }

      .argentina {
        font-size: 37px;
        margin-top: 4px;
      }

      .municipio {
        font-size: 31px;
        margin-top: 16px;
        line-height: 1.02;
      }

      .linea-color {
        width: 160px;
        height: 6px;
        margin: 12px 0 14px;
      }

      .mensaje {
        font-size: 12px;
        line-height: 1.35;
        max-width: 185px;
      }

      .toro {
        width: min(315px, 68vw);
        justify-self: center;
        align-self: end;
        margin-left: -78px;
        margin-right: 0;
        margin-bottom: -40px;
      }

      .bandera {
        bottom: 42px; /* bandera más baja en celular */
        height: 72px;
      }

      .franja-maipu {
        height: 38px;
        padding: 4px 10px;
      }

      .franja-contenido {
        justify-content: center;
        gap: 7px;
      }

      .logo-footer {
        width: 72px;
        max-height: 24px;
      }

      .texto-footer {
        font-size: 11.5px;
        letter-spacing: -.3px;
      }

      .cerrar-modal {
        width: 38px;
        height: 38px;
        top: 12px;
        right: 12px;
        font-size: 24px;
      }
    }

    @media (max-width: 430px) {
      .maipu-modal {
        min-height: 470px;
      }

      .contenido-modal {
        min-height: 470px;
        grid-template-columns: 1fr .86fr;
        padding: 30px 11px 48px;
      }

      .vamos {
        font-size: 44px;
      }

      .argentina {
        font-size: 30px;
      }

      .municipio {
        font-size: 26px;
        margin-top: 14px;
      }

      .mensaje {
        font-size: 11px;
        max-width: 160px;
      }

      .toro {
        width: min(280px, 73vw);
        margin-left: -74px;
        margin-right: 0;
        margin-bottom: -38px;
      }

      .bandera {
        bottom: 40px;
        height: 62px;
      }

      .franja-maipu {
        height: 36px;
      }

      .logo-footer {
        width: 64px;
        max-height: 22px;
      }

      .texto-footer {
        font-size: 10.5px;
      }
    }

    @media (max-width: 360px) {
      .vamos {
        font-size: 39px;
      }

      .argentina {
        font-size: 27px;
      }

      .municipio {
        font-size: 24px;
      }

      .toro {
        width: min(255px, 73vw);
        margin-left: -68px;
      }
    }
  </style>
</head>

<body>



  <!-- COPIAR DESDE ACÁ EN TU WEB -->
  <section class="maipu-welcome" id="maipuWelcome">
    <div class="maipu-modal" id="modalMaipu">
      <button class="cerrar-modal" id="cerrarModalMaipu" aria-label="Cerrar">×</button>

      <div class="brillos"></div>
      <div class="bandera"></div>

      <div class="contenido-modal">
        <div class="texto">
          <h2 class="vamos">
            Vamos
            <span class="argentina">Argentina</span>
          </h2>

          <h3 class="municipio">
            Municipalidad<br>
            de <span>Maipú</span>
          </h3>

          <div class="linea-color"></div>

          <p class="mensaje">
            Hoy más que nunca, unidos por los mismos colores.
         
          </p>
        </div>

        <div class="toro">
          <img src="toro_maipu_transparente_real.png?v=8" alt="Asistente virtual Maipú">
        </div>
      </div>

      <div class="franja-maipu">
        <div class="franja-contenido">
          <img class="logo-footer" src="assets/img/logo-maipu.png" alt="Maipú Crece">
          <div class="texto-footer">Maipú crece <span>con vos</span></div>
        </div>
      </div>
    </div>
  </section>

  <script>
    const modalBienvenida = document.getElementById("maipuWelcome");
    const tarjetaModal = document.getElementById("modalMaipu");
    const botonCerrar = document.getElementById("cerrarModalMaipu");

    const coloresPapelitos = ["#ffffff", "#62c7f4", "#94c11f", "#f29400", "#f2c438"];

    function crearPapelitos() {
      for (let i = 0; i < 65; i++) {
        const papel = document.createElement("span");
        const esCinta = Math.random() > 0.72;

        papel.className = esCinta ? "papel cinta" : "papel";

        papel.style.left = Math.random() * 100 + "%";
        papel.style.setProperty("--w", (esCinta ? 28 + Math.random() * 34 : 8 + Math.random() * 12) + "px");
        papel.style.setProperty("--h", (esCinta ? 6 : 10 + Math.random() * 18) + "px");
        papel.style.setProperty("--c", coloresPapelitos[Math.floor(Math.random() * coloresPapelitos.length)]);
        papel.style.setProperty("--d", (3.1 + Math.random() * 2.7) + "s");
        papel.style.setProperty("--delay", (Math.random() * 2.4) + "s");
        papel.style.setProperty("--x", (-100 + Math.random() * 200) + "px");
        papel.style.setProperty("--r", (Math.random() * 360) + "deg");

        tarjetaModal.appendChild(papel);
      }
    }

    function cerrarBienvenida() {
      modalBienvenida.classList.add("cerrar");

      setTimeout(() => {
        modalBienvenida.style.display = "none";
      }, 550);
    }

    crearPapelitos();

    /* 6000 = 6 segundos */
    setTimeout(cerrarBienvenida, 6000);

    botonCerrar.addEventListener("click", cerrarBienvenida);
  </script>
  <!-- COPIAR HASTA ACÁ EN TU WEB -->

</body>
</html>
